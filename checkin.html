<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>노들러닝크루 출석체크</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero {
    width: 100%;
    background: #c8e435;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px 40px;
  }

  .hero img {
    width: 320px;
    max-width: 450px;
  }

  .card {
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 36px 28px 48px;
    width: 100%;
    max-width: 480px;
    margin-top: -20px;
    flex: 1;
    text-align: center;
  }

  .date-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f0fdf4;
    color: #15803d;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 28px;
  }

  .dot-live {
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    animation: blink 1.4s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  .input-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 10px;
    text-align: center;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    font-size: 16px;
    color: #111827;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    text-align: center;
  }

  input[type="text"]:focus { border-color: #c8e435; }
  input[type="text"]::placeholder { color: #d1d5db; }

  .section-gap { margin-top: 24px; }

  .pace-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 12px;
    text-align: center;
  }

  .pace-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 4px;
  }

  .pace-btn {
    padding: 10px 6px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .pace-btn:active { transform: scale(0.96); }

  .pace-btn.selected {
    background: #c8e435;
    border-color: #c8e435;
    color: #1a1a2e;
    font-weight: 700;
  }

  .btn {
    width: 100%;
    padding: 15px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { opacity: 0.85; transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .msg {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
    display: none;
  }

  .msg.error { background: #fef2f2; color: #b91c1c; display: block; }

  .success-screen {
    text-align: center;
    display: none;
    padding: 10px 0;
  }

  .check-circle {
    width: 72px; height: 72px;
    background: #dcfce7;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
  }

  .success-screen h2 { font-size: 22px; color: #111827; margin-bottom: 8px; }
  .success-screen p { font-size: 14px; color: #6b7280; line-height: 1.6; }
  .success-pace {
    display: inline-block;
    margin-top: 12px;
    background: #c8e435;
    color: #1a1a2e;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 20px;
  }
</style>
</head>
<body>

<div class="hero">
  <img src="NDRC_Color_1.png" alt="NDRC 로고">
</div>

<div class="card">
  <div id="main-form">
    <div class="date-badge">
      <div class="dot-live"></div>
      <span id="today-date">날짜 로딩 중...</span>
    </div>

    <label class="input-label" for="name-input">이름을 입력해주세요</label>
    <input type="text" id="name-input" placeholder="홍길동" autocomplete="off" autocorrect="off">

    <div class="section-gap">
      <label class="pace-label">원하는 페이스를 선택해주세요</label>
      <div class="pace-grid" id="pace-grid"></div>
    </div>

    <button class="btn" id="checkin-btn" onclick="doCheckin()">출석 완료</button>

    <div class="msg" id="msg-box"></div>
  </div>

  <div class="success-screen" id="success-screen">
    <div class="check-circle">✓</div>
    <h2 id="success-name">출석 완료!</h2>
    <p>오늘도 함께 달려요 🏃</p>
    <div class="success-pace" id="success-pace"></div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-wNAgk-re1cXUA3bZTQC5hTCT2u9oE7vnLBGjtDMbcD63Z40hndTjUQhHNcznmFwd/exec
"
  const params = new URLSearchParams(location.search);
  const TOKEN = params.get("token") || "";
  let selectedPace = "";

  function init() {
    document.getElementById("today-date").textContent = new Date().toLocaleDateString("ko-KR", {
      year: "numeric", month: "long", day: "numeric", weekday: "long"
    });

    const paces = ["4:30/km","5:00/km","5:30/km","6:00/km","6:30/km","7:00/km"];

    const grid = document.getElementById("pace-grid");
    paces.forEach(pace => {
      const btn = document.createElement("button");
      btn.className = "pace-btn";
      btn.textContent = pace;
      btn.onclick = () => {
        document.querySelectorAll(".pace-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedPace = pace;
      };
      grid.appendChild(btn);
    });
  }

  async function doCheckin() {
    const name = document.getElementById("name-input").value.trim();
    const btn = document.getElementById("checkin-btn");

    if (!name) {
      showMsg("이름을 입력해주세요.", "error");
      return;
    }

    if (!selectedPace) {
      showMsg("페이스를 선택해주세요.", "error");
      return;
    }

    btn.disabled = true;
    btn.textContent = "처리 중...";

    try {
      const url = `${SCRIPT_URL}?action=checkin&token=${TOKEN}&name=${encodeURIComponent(name)}&pace=${encodeURIComponent(selectedPace)}`;
      await fetch(url, { method: "GET", mode: "no-cors" });

      document.getElementById("main-form").style.display = "none";
      const sc = document.getElementById("success-screen");
      sc.style.display = "block";
      document.getElementById("success-name").textContent = `${name}님, 출석 완료!`;
      document.getElementById("success-pace").textContent = `목표 페이스 ${selectedPace}`;

    } catch(e) {
      showMsg("네트워크 오류가 발생했습니다. 다시 시도해주세요.", "error");
      btn.disabled = false;
      btn.textContent = "출석 완료";
    }
  }

  function showMsg(text, type) {
    const box = document.getElementById("msg-box");
    box.textContent = text;
    box.className = `msg ${type}`;
  }

  document.getElementById("name-input").addEventListener("keydown", e => {
    if (e.key === "Enter") doCheckin();
  });

  init();
</script>
</body>
</html>
