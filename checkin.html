<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>노들러닝크루 출석체크</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero {
    width: 100%;
    background: #c8e435;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px 40px;
  }

  .hero img { width: 320px; max-width: 80%; }

  .card {
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 36px 28px 48px;
    width: 100%;
    max-width: 480px;
    margin-top: -20px;
    flex: 1;
    text-align: center;
  }

  .date-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f0fdf4;
    color: #15803d;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 28px;
  }

  .dot-live {
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    animation: blink 1.4s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  .input-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 10px;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    font-size: 16px;
    color: #111827;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    text-align: center;
  }

  input[type="text"]:focus { border-color: #c8e435; }
  input[type="text"]::placeholder { color: #d1d5db; }

  .section-gap { margin-top: 24px; }

  .pace-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 12px;
  }

  .pace-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .pace-btn {
    padding: 10px 6px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
    cursor: pointer;
    text-align: center;
  }

  .pace-btn.selected {
    background: #c8e435;
    border-color: #c8e435;
    color: #1a1a2e;
    font-weight: 700;
  }

  .btn {
    width: 100%;
    padding: 15px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:active { opacity: 0.85; }

  .msg {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
    display: none;
  }

  .msg.error { background: #fef2f2; color: #b91c1c; display: block; }

  .success-screen {
    display: none;
    text-align: center;
    padding: 10px 0;
    position: relative;
  }

  .check-circle {
    width: 80px; height: 80px;
    background: #dcfce7;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 36px;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .success-screen h2 {
    font-size: 24px;
    color: #111827;
    margin-bottom: 8px;
    animation: slideUp 0.4s ease 0.2s both;
  }

  .success-screen p {
    font-size: 14px;
    color: #6b7280;
    animation: slideUp 0.4s ease 0.3s both;
  }

  @keyframes slideUp {
    0% { transform: translateY(16px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .success-pace {
    display: inline-block;
    margin-top: 12px;
    background: #c8e435;
    color: #1a1a2e;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 20px;
    animation: slideUp 0.4s ease 0.4s both;
  }

  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
    display: none;
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="hero">
  <img src="NDRC_Color_1.png" alt="NDRC 로고">
</div>

<div class="card">
  <div id="main-form">
    <div class="date-badge">
      <div class="dot-live"></div>
      <span id="today-date">날짜 로딩 중...</span>
    </div>

    <label class="input-label">이름을 입력해주세요</label>
    <input type="text" id="name-input" placeholder="홍길동" autocomplete="off" autocorrect="off" autocapitalize="off">

    <div class="section-gap">
      <label class="pace-label">원하는 페이스를 선택해주세요</label>
      <div class="pace-grid" id="pace-grid"></div>
    </div>

    <button class="btn" id="checkin-btn" onclick="doCheckin()">출석 완료</button>
    <div class="msg" id="msg-box"></div>
  </div>

  <div class="success-screen" id="success-screen">
    <div class="check-circle">&#10003;</div>
    <h2 id="success-name">출석 완료!</h2>
    <p>오늘도 함께 달려요!</p>
    <div class="success-pace" id="success-pace"></div>
  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-wNAgk-re1cXUA3bZTQC5hTCT2u9oE7vnLBGjtDMbcD63Z40hndTjUQhHNcznmFwd/exec";
var params = new URLSearchParams(location.search);
var TOKEN = params.get("token") || "";
var selectedPace = "";
var memberList = [];

function init() {
  document.getElementById("today-date").textContent = new Date().toLocaleDateString("ko-KR", {
    year: "numeric", month: "long", day: "numeric", weekday: "long"
  });

  var paces = ["4:30/km","5:00/km","5:30/km","6:00/km","6:30/km","7:00/km"];
  var grid = document.getElementById("pace-grid");
  paces.forEach(function(pace) {
    var btn = document.createElement("button");
    btn.className = "pace-btn";
    btn.textContent = pace;
    btn.onclick = function() {
      document.querySelectorAll(".pace-btn").forEach(function(b) { b.classList.remove("selected"); });
      btn.classList.add("selected");
      selectedPace = pace;
    };
    grid.appendChild(btn);
  });

  fetch(SCRIPT_URL + "?action=getMembers")
    .then(function(r) { return r.json(); })
    .then(function(d) { memberList = d.members || []; })
    .catch(function() {});
}

function doCheckin() {
  var name = document.getElementById("name-input").value.trim();
  var btn = document.getElementById("checkin-btn");

  if (!name) { showMsg("이름을 입력해주세요.", "error"); return; }
  if (!selectedPace) { showMsg("페이스를 선택해주세요.", "error"); return; }
  if (memberList.length > 0 && !memberList.includes(name)) {
    showMsg("미가입된 사용자입니다. 이름을 다시 확인해주세요.", "error");
    return;
  }

  btn.disabled = true;
  btn.textContent = "처리 중...";

  var url = SCRIPT_URL + "?action=checkin&token=" + TOKEN +
    "&name=" + encodeURIComponent(name) +
    "&pace=" + encodeURIComponent(selectedPace);

  fetch(url, { method: "GET", mode: "no-cors" })
    .then(function() {
      document.getElementById("main-form").style.display = "none";
      document.getElementById("success-screen").style.display = "block";
      document.getElementById("success-name").textContent = name + "님, 출석 완료!";
      document.getElementById("success-pace").textContent = "목표 페이스 " + selectedPace;
      launchConfetti();
    })
    .catch(function() {
      showMsg("네트워크 오류가 발생했습니다.", "error");
      btn.disabled = false;
      btn.textContent = "출석 완료";
    });
}

function showMsg(text, type) {
  var box = document.getElementById("msg-box");
  box.textContent = text;
  box.className = "msg " + type;
}

// ── 불꽃놀이 효과 ──
function launchConfetti() {
  var canvas = document.getElementById("confetti-canvas");
  var ctx = canvas.getContext("2d");
  canvas.style.display = "block";
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  var colors = ["#c8e435","#22c55e","#3b82f6","#f59e0b","#ef4444","#8b5cf6","#fff","#fb923c"];
  var bursts = [];

  function createBurst(cx, cy, count) {
    var particles = [];
    for (var i = 0; i < count; i++) {
      var angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
      var speed = 4 + Math.random() * 8;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 3 + Math.random() * 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        opacity: 1,
        tail: []
      });
    }
    return particles;
  }

  var cx = canvas.width / 2;
  var cy = canvas.height / 2;

  setTimeout(function() { bursts.push.apply(bursts, createBurst(cx, cy * 0.5, 40)); }, 0);
  setTimeout(function() { bursts.push.apply(bursts, createBurst(cx * 0.4, cy * 0.7, 30)); }, 200);
  setTimeout(function() { bursts.push.apply(bursts, createBurst(cx * 1.6, cy * 0.7, 30)); }, 350);
  setTimeout(function() { bursts.push.apply(bursts, createBurst(cx, cy * 0.4, 35)); }, 500);
  setTimeout(function() { bursts.push.apply(bursts, createBurst(cx * 0.6, cy * 0.5, 25)); }, 650);
  setTimeout(function() { bursts.push.apply(bursts, createBurst(cx * 1.4, cy * 0.5, 25)); }, 800);

  var startTime = Date.now();
  var duration = 2500;

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var elapsed = Date.now() - startTime;

    bursts.forEach(function(p) {
      if (p.opacity <= 0) return;

      p.tail.unshift({ x: p.x, y: p.y });
      if (p.tail.length > 6) p.tail.pop();

      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15;
      p.vx *= 0.98;
      p.opacity -= 0.016;

      p.tail.forEach(function(t, i) {
        ctx.beginPath();
        ctx.arc(t.x, t.y, p.size * (1 - i / p.tail.length) * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, p.opacity * (1 - i / p.tail.length) * 0.4);
        ctx.fill();
      });

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.fill();
    });

    ctx.globalAlpha = 1;

    if (elapsed < duration) {
      requestAnimationFrame(animate);
    } else {
      canvas.style.display = "none";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  animate();
}

document.getElementById("name-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doCheckin();
});

init();
</script>
</body>
</html>
