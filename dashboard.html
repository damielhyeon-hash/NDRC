<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노들러닝크루 운영 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    color: #111827;
  }

  .topbar {
    background: #1a1a2e;
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .topbar-sub { font-size: 12px; opacity: 0.6; margin-top: 2px; }

  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    margin-right: 5px;
    animation: blink 1.4s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  .topbar-right { font-size: 12px; opacity: 0.7; text-align: right; }

  .container { padding: 16px; max-width: 600px; margin: 0 auto; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .stat { background: #fff; border-radius: 14px; padding: 14px 12px; border: 1px solid #f3f4f6; }
  .stat-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
  .stat-val { font-size: 26px; font-weight: 700; color: #111827; }
  .stat-val.blue { color: #2563eb; }
  .stat-val.green { color: #16a34a; }

  .section {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #f3f4f6;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .section-header {
    padding: 14px 16px;
    background: #f9fafb;
    border-bottom: 1px solid #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title { font-size: 13px; font-weight: 600; color: #374151; }

  .export-btn {
    font-size: 12px; padding: 6px 14px;
    border-radius: 20px; border: none;
    background: #1a1a2e; cursor: pointer;
    color: #fff; font-weight: 500;
  }

  .qr-section {
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .qr-date { font-size: 15px; font-weight: 600; color: #111827; text-align: center; }

  .qr-box {
    background: #fff;
    border: 2px solid #c8e435;
    border-radius: 20px;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qr-hint { font-size: 12px; color: #6b7280; text-align: center; line-height: 1.6; }

  .qr-link-row { display: flex; gap: 8px; width: 100%; }
  .qr-link-box {
    flex: 1; background: #f3f4f6;
    border-radius: 8px; padding: 8px 12px;
    font-size: 11px; color: #374151;
    word-break: break-all; font-family: monospace;
  }

  .copy-btn {
    font-size: 12px; padding: 8px 14px;
    border-radius: 8px; border: 1px solid #e5e7eb;
    background: #fff; cursor: pointer;
    color: #374151; white-space: nowrap; font-weight: 500;
  }

  .member-row {
    display: flex; align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid #f9fafb;
    gap: 10px;
  }

  .member-row:last-child { border-bottom: none; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #dbeafe; color: #1e40af;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .avatar.absent { background: #f3f4f6; color: #9ca3af; }
  .member-name { font-size: 14px; color: #111827; flex: 1; }
  .member-time { font-size: 12px; color: #6b7280; }

  .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
  .badge-ok { background: #dcfce7; color: #15803d; }
  .badge-no { background: #f3f4f6; color: #6b7280; }

  .pace-badge {
    font-size: 11px; padding: 3px 9px;
    border-radius: 20px; font-weight: 600;
    background: #c8e435; color: #1a1a2e;
  }

  .history-row {
    display: flex; align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid #f9fafb; gap: 10px;
  }

  .history-row:last-child { border-bottom: none; }
  .history-num { font-size: 11px; width: 20px; color: #9ca3af; text-align: center; }
  .bar-wrap { flex: 1; background: #f3f4f6; border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: #1a1a2e; border-radius: 4px; }
  .history-count { font-size: 12px; color: #6b7280; min-width: 32px; text-align: right; }

  .refresh-row { text-align: center; padding: 12px; }
  .refresh-btn {
    font-size: 13px; padding: 8px 20px;
    border-radius: 20px; border: 1px solid #e5e7eb;
    background: #fff; cursor: pointer; color: #374151;
  }

  .loading { text-align: center; padding: 40px; color: #9ca3af; font-size: 14px; }
  .tab-row { display: flex; gap: 6px; }
  .tab {
    font-size: 12px; padding: 5px 14px;
    border-radius: 20px; border: 1px solid #e5e7eb;
    background: #f9fafb; color: #6b7280; cursor: pointer;
  }
  .tab.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div>
      <div class="topbar-title">노들러닝크루</div>
      <div class="topbar-sub">운영자 대시보드</div>
    </div>
  </div>
  <div class="topbar-right">
    <div><span class="live-dot"></span>실시간</div>
    <div id="last-updated">-</div>
  </div>
</div>

<div class="container">

  <div class="stats-row">
    <div class="stat"><div class="stat-label">전체 멤버</div><div class="stat-val" id="s-total">-</div></div>
    <div class="stat"><div class="stat-label">오늘 출석</div><div class="stat-val blue" id="s-checked">-</div></div>
    <div class="stat"><div class="stat-label">출석률</div><div class="stat-val green" id="s-rate">-</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">이번 주 QR코드</div>
      <button class="export-btn" onclick="exportCSV()">CSV 내보내기</button>
    </div>
    <div class="qr-section">
      <div class="qr-date" id="qr-date">날짜 로딩 중...</div>
      <div class="qr-box">
        <div id="qr-canvas"></div>
      </div>
      <div class="qr-hint">참가자가 기본 카메라 앱으로 QR을 스캔하면<br>바로 출석체크 페이지로 연결됩니다</div>
      <div class="qr-link-row">
        <div class="qr-link-box" id="qr-link">링크 로딩 중...</div>
        <button class="copy-btn" onclick="copyLink()">복사</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title" id="list-title">오늘 출석 현황</div>
      <div class="tab-row">
        <button class="tab active" onclick="switchTab('today', this)">오늘</button>
        <button class="tab" onclick="switchTab('history', this)">누적</button>
      </div>
    </div>

    <div id="list-today">
      <div class="loading" id="loading-msg">데이터 불러오는 중...</div>
      <div id="member-list"></div>
    </div>

    <div id="list-history" style="display:none;">
      <div id="history-list"></div>
    </div>
  </div>

  <div class="refresh-row">
    <button class="refresh-btn" onclick="loadData()">새로고침</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-wNAgk-re1cXUA3bZTQC5hTCT2u9oE7vnLBGjtDMbcD63Z40hndTjUQhHNcznmFwd/exec";
var allData = null;
var checkinUrl = "";
var qrGenerated = false;

function getWeekToken() {
  var now = new Date();
  var day = now.getDay();
  var diff = (day >= 4) ? day - 4 : day + 3;
  var thursday = new Date(now);
  thursday.setDate(now.getDate() - diff);
  var y = thursday.getFullYear();
  var m = String(thursday.getMonth() + 1).padStart(2, "0");
  var d = String(thursday.getDate()).padStart(2, "0");
  return "RUN-" + y + m + d;
}

function generateQR() {
  var token = getWeekToken();
  var baseUrl = location.href.replace("dashboard.html", "checkin.html");
  checkinUrl = baseUrl + "?token=" + token;
  document.getElementById("qr-link").textContent = checkinUrl;

  if (!qrGenerated) {
    new QRCode(document.getElementById("qr-canvas"), {
      text: checkinUrl,
      width: 200,
      height: 200,
      colorDark: "#1a1a2e",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
    qrGenerated = true;
  }
}

async function loadData() {
  try {
    var res = await fetch(SCRIPT_URL + "?action=getRecords");
    allData = await res.json();

    var now = new Date();
    document.getElementById("last-updated").textContent =
      now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0") + " 기준";

    document.getElementById("qr-date").textContent = allData.date;

    var members = allData.members || [];
    var records = allData.records || [];
    var checkedNames = records.map(function(r) { return r.name; });

    document.getElementById("s-total").textContent = members.length;
    document.getElementById("s-checked").textContent = checkedNames.length;
    var rate = members.length > 0 ? Math.round(checkedNames.length / members.length * 100) : 0;
    document.getElementById("s-rate").textContent = rate + "%";

    document.getElementById("loading-msg").style.display = "none";

    var listEl = document.getElementById("member-list");
    listEl.innerHTML = "";

    var sorted = records.map(function(r) {
      return { name: r.name, time: r.time, pace: r.pace, checked: true };
    }).concat(members.filter(function(m) {
      return !checkedNames.includes(m);
    }).map(function(m) {
      return { name: m, time: null, pace: null, checked: false };
    }));

    sorted.forEach(function(item) {
      var initials = item.name.slice(0, 2);
      var div = document.createElement("div");
      div.className = "member-row";
      div.innerHTML =
        '<div class="avatar ' + (item.checked ? "" : "absent") + '">' + initials + '</div>' +
        '<div class="member-name">' + item.name + '</div>' +
        (item.pace ? '<div class="pace-badge">' + item.pace + '</div>' : '') +
        '<div class="member-time">' + (item.time || "—") + '</div>' +
        '<div class="badge ' + (item.checked ? "badge-ok" : "badge-no") + '">' + (item.checked ? "출석" : "미출석") + '</div>';
      listEl.appendChild(div);
    });

    var histEl = document.getElementById("history-list");
    histEl.innerHTML = "";
    var history = allData.history || {};
    var histSorted = Object.entries(history).sort(function(a, b) { return b[1] - a[1]; });
    var maxCount = histSorted[0] ? histSorted[0][1] : 1;

    histSorted.forEach(function(entry, i) {
      var name = entry[0], count = entry[1];
      var div = document.createElement("div");
      div.className = "history-row";
      var pct = Math.round(count / maxCount * 100);
      div.innerHTML =
        '<div class="history-num">' + (i + 1) + '</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:13px;margin-bottom:4px;color:#111827;">' + name + '</div>' +
          '<div class="bar-wrap"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
        '</div>' +
        '<div class="history-count">' + count + '회</div>';
      histEl.appendChild(div);
    });

  } catch(e) {
    document.getElementById("loading-msg").textContent = "데이터를 불러오지 못했습니다.";
  }
}

function switchTab(tab, el) {
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  el.classList.add("active");
  document.getElementById("list-today").style.display = tab === "today" ? "block" : "none";
  document.getElementById("list-history").style.display = tab === "history" ? "block" : "none";
  document.getElementById("list-title").textContent = tab === "today" ? "오늘 출석 현황" : "누적 출석 순위";
}

function copyLink() {
  navigator.clipboard.writeText(checkinUrl).then(function() {
    var btn = event.target;
    btn.textContent = "완료!";
    setTimeout(function() { btn.textContent = "복사"; }, 2000);
  });
}

function exportCSV() {
  if (!allData) return;
  var rows = [["날짜","이름","체크인시간","페이스"]];
  (allData.records || []).forEach(function(r) {
    rows.push([r.date, r.name, r.time, r.pace || ""]);
  });
  var csv = rows.map(function(r) { return r.join(","); }).join("\n");
  var blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "출석기록_" + (allData.token || "") + ".csv";
  a.click();
}

generateQR();
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
