<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노들러닝크루 공지사항</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
  }

  .topbar {
    background: #1a1a2e;
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-logo {
    width: 28px; height: 28px;
    background: #c8e435;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }

  .topbar-title { font-size: 16px; font-weight: 600; }

  .container { padding: 16px; max-width: 600px; margin: 0 auto; }

  .notice-card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #f3f4f6;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .notice-img {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
  }

  .notice-body { padding: 16px; }

  .notice-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .notice-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: #c8e435;
    color: #1a1a2e;
  }

  .notice-date {
    font-size: 12px;
    color: #9ca3af;
  }

  .notice-title {
    font-size: 16px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .notice-content {
    font-size: 14px;
    color: #374151;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #9ca3af;
    font-size: 14px;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #9ca3af;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round">
      <path d="M13 4a1 1 0 1 0 2 0 1 1 0 0 0-2 0"/>
      <path d="M7 20l3-8 2 3 3-5 3 10"/>
    </svg>
  </div>
  <div class="topbar-title">공지사항</div>
</div>

<div class="container">
  <div class="loading" id="loading">공지사항을 불러오는 중...</div>
  <div id="notice-list"></div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-wNAgk-re1cXUA3bZTQC5hTCT2u9oE7vnLBGjtDMbcD63Z40hndTjUQhHNcznmFwd/exec";

function loadNotices() {
  fetch(SCRIPT_URL + "?action=getNotices")
    .then(function(res) { return res.json(); })
    .then(function(data) {
      document.getElementById("loading").style.display = "none";
      var notices = data.notices || [];
      var list = document.getElementById("notice-list");

      if (notices.length === 0) {
        list.innerHTML = '<div class="empty">아직 공지사항이 없습니다.</div>';
        return;
      }

      notices.forEach(function(notice) {
        var card = document.createElement("div");
        card.className = "notice-card";
        var imgHtml = notice.imageUrl
          ? '<img class="notice-img" src="' + notice.imageUrl + '" alt="공지 이미지">'
          : "";
        card.innerHTML = imgHtml +
          '<div class="notice-body">' +
            '<div class="notice-meta">' +
              '<span class="notice-badge">공지</span>' +
              '<span class="notice-date">' + notice.date + '</span>' +
            '</div>' +
            '<div class="notice-title">' + notice.title + '</div>' +
            '<div class="notice-content">' + notice.content + '</div>' +
          '</div>';
        list.appendChild(card);
      });
    })
    .catch(function() {
      document.getElementById("loading").textContent = "공지사항을 불러오지 못했습니다.";
    });
}

loadNotices();
</script>
</body>
</html>
