<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>노들러닝크루 NDRC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
  }

  .screen.active { display: flex; }

  .hero {
    width: 100%;
    background: #c8e435;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 50px;
  }

  .hero img { width: 260px; max-width: 70%; }

  .card {
    background: #fff;
    border-radius: 28px 28px 0 0;
    padding: 32px 24px 48px;
    width: 100%;
    flex: 1;
  }

  .crew-name { font-size: 18px; font-weight: 700; color: #111827; text-align: center; margin-bottom: 4px; }
  .crew-since { font-size: 13px; color: #9ca3af; text-align: center; margin-bottom: 32px; }

  .menu-btn {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 18px 20px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    margin-bottom: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
  }

  .menu-btn:active { background: #f9fafb; transform: scale(0.98); }

  .menu-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-right: 14px;
    flex-shrink: 0;
  }

  .menu-icon.green { background: #c8e435; }
  .menu-icon.dark { background: #1a1a2e; }
  .menu-text { flex: 1; }
  .menu-title { font-size: 15px; font-weight: 600; color: #111827; margin-bottom: 2px; }
  .menu-sub { font-size: 12px; color: #9ca3af; }
  .menu-arrow { color: #d1d5db; font-size: 18px; }

  /* 스캔 화면 */
  .scan-header {
    width: 100%;
    display: flex;
    align-items: center;
    padding: 16px 20px;
    background: #1a1a2e;
    color: #fff;
    gap: 12px;
  }

  .back-btn {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .scan-title { font-size: 16px; font-weight: 600; }

  .scan-body {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #000;
  }

  #qr-video {
    width: 100%;
    max-height: 65vh;
    object-fit: cover;
    display: block;
  }

  .scan-frame-wrap {
    position: relative;
    width: 100%;
  }

  .scan-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 220px; height: 220px;
    border: 3px solid #c8e435;
    border-radius: 16px;
    box-shadow: 0 0 0 1000px rgba(0,0,0,0.45);
  }

  .scan-bottom {
    width: 100%;
    background: #111827;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .scan-hint { font-size: 13px; color: #9ca3af; text-align: center; line-height: 1.6; }

  .scan-status {
    font-size: 14px;
    font-weight: 500;
    color: #c8e435;
    text-align: center;
    min-height: 20px;
  }

  canvas#qr-canvas { display: none; }

  /* 체크인 화면 */
  .checkin-header {
    width: 100%;
    display: flex;
    align-items: center;
    padding: 16px 20px;
    background: #1a1a2e;
    color: #fff;
    gap: 12px;
  }

  .checkin-body {
    width: 100%;
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 32px 24px 48px;
    flex: 1;
    text-align: center;
    margin-top: -1px;
  }

  .verified-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f0fdf4;
    color: #15803d;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .dot-green { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; }

  .input-label { display: block; font-size: 14px; font-weight: 600; color: #111827; margin-bottom: 10px; }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    font-size: 16px;
    color: #111827;
    outline: none;
    -webkit-appearance: none;
    text-align: center;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus { border-color: #c8e435; }
  input[type="text"]::placeholder { color: #d1d5db; }

  .section-gap { margin-top: 24px; }

  .pace-label { display: block; font-size: 14px; font-weight: 600; color: #111827; margin-bottom: 12px; }

  .pace-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .pace-btn {
    padding: 10px 6px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
    cursor: pointer;
    text-align: center;
  }

  .pace-btn.selected {
    background: #c8e435;
    border-color: #c8e435;
    color: #1a1a2e;
    font-weight: 700;
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
  }

  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .msg { margin-top: 14px; padding: 12px 16px; border-radius: 12px; font-size: 14px; text-align: center; display: none; }
  .msg.error { background: #fef2f2; color: #b91c1c; display: block; }

  /* 성공 화면 */
  .success-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fff;
    width: 100%;
    text-align: center;
    padding: 40px 24px;
  }

  .check-circle {
    width: 80px; height: 80px;
    background: #dcfce7;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 36px;
  }

  .success-body h2 { font-size: 24px; color: #111827; margin-bottom: 8px; }
  .success-body p { font-size: 14px; color: #6b7280; }

  .success-pace {
    display: inline-block;
    margin-top: 16px;
    background: #c8e435;
    color: #1a1a2e;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 20px;
  }

  .home-btn {
    margin-top: 32px;
    padding: 14px 32px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- 홈 화면 -->
<div class="screen active" id="home-screen">
  <div class="hero" style="width:100%;">
    <img src="NDRC_Color_1.png" alt="NDRC 로고">
  </div>
  <div class="card">
    <div class="crew-name">노들러닝크루, NDRC</div>
    <div class="crew-since">Since 2022.06.02</div>

    <div class="menu-btn" onclick="showScreen('scan-screen'); startCamera();">
      <div class="menu-icon green">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round">
          <path d="M13 4a1 1 0 1 0 2 0 1 1 0 0 0-2 0"/>
          <path d="M7 20l3-8 2 3 3-5 3 10"/>
        </svg>
      </div>
      <div class="menu-text">
        <div class="menu-title">출석체크</div>
        <div class="menu-sub">QR코드를 스캔해주세요</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>

    <a class="menu-btn" href="notice.html">
      <div class="menu-icon dark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c8e435" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <div class="menu-text">
        <div class="menu-title">공지사항</div>
        <div class="menu-sub">NDRC 소식을 확인하세요</div>
      </div>
      <div class="menu-arrow">›</div>
    </a>
  </div>
</div>

<!-- QR 스캔 화면 -->
<div class="screen" id="scan-screen">
  <div class="scan-header">
    <button class="back-btn" onclick="stopCamera(); showScreen('home-screen');">‹</button>
    <div class="scan-title">QR코드 스캔</div>
  </div>
  <div class="scan-frame-wrap">
    <video id="qr-video" playsinline autoplay muted></video>
    <div class="scan-overlay">
      <div class="scan-frame"></div>
    </div>
  </div>
  <div class="scan-bottom">
    <div class="scan-hint">운영진이 보여주는 QR코드를<br>네모 안에 맞춰주세요</div>
    <div class="scan-status" id="scan-status"></div>
  </div>
  <canvas id="qr-canvas"></canvas>
</div>

<!-- 체크인 입력 화면 -->
<div class="screen" id="checkin-screen">
  <div class="checkin-header">
    <button class="back-btn" onclick="showScreen('scan-screen'); startCamera();">‹</button>
    <div class="scan-title">출석체크</div>
  </div>
  <div class="checkin-body">
    <div class="verified-badge">
      <div class="dot-green"></div>
      <span id="verified-date">QR 인증 완료</span>
    </div>

    <label class="input-label">이름을 입력해주세요</label>
    <input type="text" id="name-input" placeholder="홍길동" autocomplete="off" autocorrect="off" autocapitalize="off">

    <div class="section-gap">
      <label class="pace-label">원하는 페이스를 선택해주세요</label>
      <div class="pace-grid" id="pace-grid"></div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="doCheckin()">출석 완료</button>
    <div class="msg" id="msg-box"></div>
  </div>
</div>

<!-- 성공 화면 -->
<div class="screen" id="success-screen">
  <div class="success-body">
    <div class="check-circle">&#10003;</div>
    <h2 id="success-name">출석 완료!</h2>
    <p>오늘도 함께 달려요!</p>
    <div class="success-pace" id="success-pace"></div>
    <button class="home-btn" onclick="goHome()">홈으로</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-wNAgk-re1cXUA3bZTQC5hTCT2u9oE7vnLBGjtDMbcD63Z40hndTjUQhHNcznmFwd/exec";
var scannedToken = "";
var selectedPace = "";
var memberList = [];
var videoStream = null;
var scanInterval = null;

// 멤버 목록 미리 로드
fetch(SCRIPT_URL + "?action=getMembers")
  .then(function(r) { return r.json(); })
  .then(function(d) { memberList = d.members || []; })
  .catch(function() {});

// 페이스 버튼 생성
var paces = ["4:30/km","5:00/km","5:30/km","6:00/km","6:30/km","7:00/km"];
var grid = document.getElementById("pace-grid");
paces.forEach(function(pace) {
  var btn = document.createElement("button");
  btn.className = "pace-btn";
  btn.textContent = pace;
  btn.onclick = function() {
    document.querySelectorAll(".pace-btn").forEach(function(b) { b.classList.remove("selected"); });
    btn.classList.add("selected");
    selectedPace = pace;
  };
  grid.appendChild(btn);
});

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(s) {
    s.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function startCamera() {
  if (videoStream) return;
  var constraints = {
    video: {
      facingMode: { ideal: "environment" },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  };

  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      videoStream = stream;
      var video = document.getElementById("qr-video");
      video.srcObject = stream;
      video.setAttribute("playsinline", true);
      video.play();
      video.onloadedmetadata = function() {
        scanInterval = setInterval(scanQR, 200);
      };
    })
    .catch(function(err) {
      document.getElementById("scan-status").textContent = "카메라 권한이 필요합니다.";
    });
}

function stopCamera() {
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (videoStream) {
    videoStream.getTracks().forEach(function(t) { t.stop(); });
    videoStream = null;
    document.getElementById("qr-video").srcObject = null;
  }
}

function scanQR() {
  var video = document.getElementById("qr-video");
  if (!video || video.readyState < 2 || video.videoWidth === 0) return;

  var canvas = document.getElementById("qr-canvas");
  var ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  try {
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: "dontInvert"
    });

    if (code && code.data) {
      var tokenMatch = code.data.match(/RUN-\d{8}/);
      if (tokenMatch) {
        scannedToken = tokenMatch[0];
        stopCamera();

        var year = scannedToken.substring(4, 8);
        var month = scannedToken.substring(8, 10);
        var day = scannedToken.substring(10, 12);
        document.getElementById("verified-date").textContent =
          year + "년 " + month + "월 " + day + "일 QR 인증 완료";

        showScreen("checkin-screen");
        setTimeout(function() {
          document.getElementById("name-input").focus();
        }, 300);
      }
    }
  } catch(e) {}
}

function doCheckin() {
  var name = document.getElementById("name-input").value.trim();
  var btn = document.getElementById("submit-btn");

  if (!name) { showMsg("이름을 입력해주세요.", "error"); return; }
  if (!selectedPace) { showMsg("페이스를 선택해주세요.", "error"); return; }
  if (memberList.length > 0 && !memberList.includes(name)) {
    showMsg("미가입된 사용자입니다. 이름을 다시 확인해주세요.", "error");
    return;
  }

  btn.disabled = true;
  btn.textContent = "처리 중...";

  var url = SCRIPT_URL + "?action=checkin&token=" + scannedToken +
    "&name=" + encodeURIComponent(name) +
    "&pace=" + encodeURIComponent(selectedPace);

  fetch(url, { method: "GET", mode: "no-cors" })
    .then(function() {
      document.getElementById("success-name").textContent = name + "님, 출석 완료!";
      document.getElementById("success-pace").textContent = "목표 페이스 " + selectedPace;
      showScreen("success-screen");
    })
    .catch(function() {
      showMsg("네트워크 오류가 발생했습니다.", "error");
      btn.disabled = false;
      btn.textContent = "출석 완료";
    });
}

function showMsg(text, type) {
  var box = document.getElementById("msg-box");
  box.textContent = text;
  box.className = "msg " + type;
}

function goHome() {
  stopCamera();
  selectedPace = "";
  scannedToken = "";
  document.querySelectorAll(".pace-btn").forEach(function(b) { b.classList.remove("selected"); });
  document.getElementById("name-input").value = "";
  document.getElementById("msg-box").className = "msg";
  document.getElementById("submit-btn").disabled = false;
  document.getElementById("submit-btn").textContent = "출석 완료";
  showScreen("home-screen");
}

document.getElementById("name-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doCheckin();
});
</script>
</body>
</html>
